name: Cloud Scraper Routine
on:
  workflow_dispatch:
jobs:
  scrape-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Setup Node Runtime
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Cloud Core Dependencies
        run: npm install

      - name: Run Script Pipeline Execution
        env:
          BROWSERLESS_TOKEN: ${{ secrets.BROWSERLESS_TOKEN }}
          COOKIE_NAME: ${{ secrets.COOKIE_NAME }}
          COOKIE_VALUE: ${{ secrets.COOKIE_VALUE }}
        run: node index.js

      - name: Upload Scraped HTML Artifact
        uses: actions/upload-artifact@v4
        with:
          name: offline-qna-file
          path: All_Years_Complete_Offline_QnA.html
